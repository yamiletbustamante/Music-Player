<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="main-container">

        <!-- PANTALLA -->
        <div class="screen">
            <div class="screen-header">
                <span class="screen-label">NOW PLAYING</span>
                <span class="status-dot" id="statusDot"></span>
            </div>

            <div class="album-art" id="albumArt">
                <div id="albumPlaceholder">
                    <svg viewBox="0 0 60 60" fill="none" width="60" height="60">
                        <circle cx="30" cy="30" r="28" stroke="currentColor" stroke-width="1.5" />
                        <circle cx="30" cy="30" r="10" stroke="currentColor" stroke-width="1.5" />
                        <circle cx="30" cy="30" r="3" fill="currentColor" />
                    </svg>
                </div>
                <img id="albumImg" src="" alt="Album">
            </div>

            <div class="track-title" id="trackTitle">Busca una canción</div>
            <div class="track-artist" id="trackArtist">iTunes Music Player</div>

            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-row">
                <span id="currentTime">0:00</span>
                <span id="totalTime">0:00</span>
            </div>
        </div>

        <!-- CONTROLES -->
        <div class="controls-panel">

            <div class="search-box">
                <svg viewBox="0 0 20 20" fill="none" width="16" height="16">
                    <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5" />
                    <path d="M14 14L18 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                </svg>
                <input type="text" id="searchInput" placeholder="Artista o canción..." autocomplete="off">
                <button id="searchBtn">GO</button>
            </div>

            <div class="wheel">
                <button class="arc-btn arc-top" id="menuBtn">
                    <span class="menu-label">MENU</span>
                </button>
                <button class="arc-btn arc-left" id="prevBtn">
                    <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                        <path d="M13 5l-6 5 6 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M6 5v10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                </button>
                <button class="arc-btn arc-right" id="nextBtn">
                    <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                        <path d="M7 5l6 5-6 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                            stroke-linejoin="round" />
                        <path d="M14 5v10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                </button>
                <button class="arc-btn arc-bottom" id="volBtn">
                    <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
                        <path d="M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>

                <button class="center-btn" id="playBtn">
                    <svg id="playIcon" viewBox="0 0 24 24" fill="none" width="26" height="26">
                        <path d="M8 5l12 7-12 7V5z" fill="currentColor" />
                    </svg>
                    <svg id="pauseIcon" viewBox="0 0 24 24" fill="none" width="26" height="26" style="display:none">
                        <rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor" />
                        <rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor" />
                    </svg>
                </button>
            </div>

            <div class="volume-row">
                <svg viewBox="0 0 16 16" fill="none" width="14" height="14">
                    <path d="M2 5H5.5L10 2V14L5.5 11H2V5Z" fill="currentColor" />
                    <path d="M12 4C13.5 5.5 13.5 10.5 12 12" stroke="currentColor" stroke-width="1.3"
                        stroke-linecap="round" />
                </svg>
                <div class="volume-bar" id="volumeBar">
                    <div class="volume-fill" id="volumeFill" style="width:80%"></div>
                </div>
                <span id="volLabel" class="vol-label">80</span>
            </div>

        </div>
    </div>

    <!-- Panel de resultados -->
    <div class="results-panel" id="resultsPanel" style="display:none">
        <div class="results-header">
            <span id="resultsCount"></span>
            <button id="closeResults">✕</button>
        </div>
        <div id="resultsContent"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="script.js"></script>
</body>

</html>
